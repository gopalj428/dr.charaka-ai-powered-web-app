<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dr. Charaka AI - Medical Assistant</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Söhne', ui-sans-serif, system-ui, -apple-system, sans-serif;
            background: #212121;
            color: #ececec;
            height: 100vh;
            overflow: hidden;
        }

        .gpt-shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            background: #171717;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.2s ease, opacity 0.2s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            opacity: 0;
        }

        .sidebar-top {
            padding: 12px 10px 8px;
        }

        .new-chat-btn {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: none;
            border: none;
            border-radius: 8px;
            color: #ececec;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .new-chat-btn:hover {
            background: #2a2a2a;
        }

        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            color: #8e8ea0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 12px 14px 6px;
        }

        .sidebar-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }

        .sidebar-history::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-history::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .history-item {
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #c5c5d2;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: #2a2a2a;
        }

        .history-item.active {
            background: #2a2a2a;
            color: #ececec;
        }

        .sidebar-footer {
            padding: 12px 10px;
            border-top: 1px solid #2a2a2a;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: default;
            font-size: 14px;
            color: #c5c5d2;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #19c37d;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ── Main panel ── */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #212121;
        }

        .topbar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: color 0.15s, background 0.15s;
        }

        .sidebar-toggle:hover {
            background: #2a2a2a;
            color: #ececec;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: #ececec;
        }

        /* ── Messages ── */
        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .messages-wrap::-webkit-scrollbar {
            width: 6px;
        }

        .messages-wrap::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .messages {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Welcome */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 48px 16px 32px;
            gap: 12px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #19c37d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin-bottom: 8px;
        }

        .welcome-screen h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ececec;
        }

        .welcome-screen p {
            font-size: 15px;
            color: #8e8ea0;
            line-height: 1.6;
        }

        .suggestion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 560px;
        }

        .suggestion-card {
            padding: 14px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: #c5c5d2;
            font-size: 13px;
            line-height: 1.5;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .suggestion-card:hover {
            background: #333;
            border-color: #4a4a4a;
            color: #ececec;
        }

        /* Message rows */
        .msg-row {
            display: flex;
            flex-direction: column;
            padding: 16px 0;
        }

        .msg-row+.msg-row {
            border-top: 1px solid #2a2a2a;
        }

        .msg-row.user {
            align-items: flex-end;
        }

        .msg-row.bot {
            align-items: flex-start;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .msg-meta .name {
            font-size: 13px;
            font-weight: 600;
            color: #ececec;
        }

        .bot-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #19c37d;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bot-avatar svg {
            width: 14px;
            height: 14px;
        }

        .msg-bubble {
            font-size: 15px;
            line-height: 1.75;
            color: #ececec;
            max-width: 88%;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .msg-row.user .msg-bubble {
            background: #2f2f2f;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
        }

        .msg-row.bot .msg-bubble {
            background: transparent;
            padding: 0;
        }

        .section-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #19c37d;
            margin-bottom: 4px;
            margin-top: 10px;
        }

        /* Typing */
        .typing-row {
            padding: 16px 0;
            border-top: 1px solid #2a2a2a;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #8e8ea0;
            animation: pulse 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8)
            }

            40% {
                opacity: 1;
                transform: scale(1)
            }
        }

        /* Input */
        .input-area {
            padding: 12px 16px 16px;
            flex-shrink: 0;
            max-width: 752px;
            width: 100%;
            margin: 0 auto;
        }

        .input-form {
            width: 100%;
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            background: #2f2f2f;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 10px 12px;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: #555;
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.6;
            color: #ececec;
            max-height: 200px;
            overflow-y: auto;
        }

        textarea::placeholder {
            color: #666;
        }

        textarea::-webkit-scrollbar {
            width: 4px;
        }

        textarea::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        #sendBtn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #19c37d;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff;
            transition: background 0.15s, opacity 0.15s;
            opacity: 0.4;
        }

        #sendBtn:not(:disabled) {
            opacity: 1;
        }

        #sendBtn:not(:disabled):hover {
            background: #16a86a;
        }

        #sendBtn:disabled {
            cursor: default;
        }

        .input-disclaimer {
            font-size: 11px;
            color: #555;
            text-align: center;
            margin-top: 8px;
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            .sidebar {
                display: none;
            }

            .suggestion-grid {
                grid-template-columns: 1fr;
            }

            .msg-bubble {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="gpt-shell">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    New chat
                </button>
            </div>
            <div class="sidebar-label">Recent</div>
            <div class="sidebar-history" id="sidebarHistory"></div>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar">D</div>
                    <span>Dr. Charaka AI</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-panel">

            <!-- Top bar -->
            <header class="topbar">
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <span class="topbar-title">Dr. Charaka AI</span>
                <div style="width:36px;"></div>
            </header>

            <!-- Messages -->
            <div class="messages-wrap" id="messagesWrap">
                <div class="messages" id="messages">

                    <!-- Welcome screen shown when no messages -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-logo">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
                            </svg>
                        </div>
                        <h1>Dr. Charaka AI</h1>
                        <p>Combining Ayurvedic wisdom with modern medicine.<br>Describe your concern to begin.</p>
                        <div class="suggestion-grid">
                            <button class="suggestion-card" onclick="useSuggestion(this)">I have had a headache for 3
                                days</button>
                            <button class="suggestion-card" onclick="useSuggestion(this)">What are symptoms of vitamin D
                                deficiency?</button>
                            <button class="suggestion-card" onclick="useSuggestion(this)">I feel anxious and cannot
                                sleep well</button>
                            <button class="suggestion-card" onclick="useSuggestion(this)">My lower back has been hurting
                                for a week</button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <form id="chatForm" class="input-form">
                    <div class="input-box" id="inputBox">
                        <textarea id="messageInput" placeholder="Message Dr. Charaka AI..." rows="1"></textarea>
                        <button type="submit" id="sendBtn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="input-disclaimer">Dr. Charaka AI may produce inaccurate information. Always consult a
                    qualified healthcare professional.</p>
            </div>

        </main>
    </div>

    <script>
        // ── Session ID (replace with server-rendered value if using Django) ──
        let sessionId = 'session-' + Math.random().toString(36).slice(2, 10);

        function getCSRF() {
            const name = 'csrftoken';
            for (const c of document.cookie.split(';')) {
                const t = c.trim();
                if (t.startsWith(name + '=')) return decodeURIComponent(t.slice(name.length + 1));
            }
            return '';
        }

        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('collapsed');
        });

        // Auto-resize textarea
        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            document.getElementById('sendBtn').disabled = !this.value.trim();
        });

        textarea.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!document.getElementById('sendBtn').disabled) {
                    document.getElementById('chatForm').dispatchEvent(new Event('submit'));
                }
            }
        });

        // Suggestion cards
        function useSuggestion(btn) {
            textarea.value = btn.textContent;
            textarea.dispatchEvent(new Event('input'));
            textarea.focus();
        }

        function formatBotText(text) {
            const sections = ['ASSESSMENT:', 'RECOMMENDATIONS:', 'RECOMMENDATION:', 'NOTE:', 'DISCLAIMER:', 'TREATMENT:', 'DIAGNOSIS:', 'ADVICE:'];
            let out = '';
            const lines = text.split('\n');
            for (const line of lines) {
                const matched = sections.find(s => line.trim().startsWith(s));
                if (matched) {
                    const rest = line.trim().slice(matched.length).trim();
                    out += `<span class="section-tag">${matched}</span>${rest ? '\n' + rest : ''}\n`;
                } else {
                    out += line + '\n';
                }
            }
            return out;
        }

        function scrollBottom() {
            const wrap = document.getElementById('messagesWrap');
            wrap.scrollTop = wrap.scrollHeight;
        }

        function hideWelcome() {
            const w = document.getElementById('welcomeScreen');
            if (w) w.remove();
        }

        function addUserMsg(text) {
            hideWelcome();
            const row = document.createElement('div');
            row.className = 'msg-row user';
            row.innerHTML = `
      <div class="msg-meta"><span class="name">You</span></div>
      <div class="msg-bubble">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
            document.getElementById('messages').appendChild(row);
            scrollBottom();
        }

        function addBotMsg(text) {
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            row.innerHTML = `
      <div class="msg-meta">
        <div class="bot-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span class="name">Dr. Charaka AI</span>
      </div>
      <div class="msg-bubble">${formatBotText(text)}</div>`;
            document.getElementById('messages').appendChild(row);
            scrollBottom();
        }

        function showTyping() {
            const row = document.createElement('div');
            row.className = 'msg-row bot typing-row';
            row.id = 'typingRow';
            row.innerHTML = `
      <div class="msg-meta">
        <div class="bot-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span class="name">Dr. Charaka AI</span>
      </div>
      <div class="typing-dots"><span></span><span></span><span></span></div>`;
            document.getElementById('messages').appendChild(row);
            scrollBottom();
        }

        function removeTyping() {
            const t = document.getElementById('typingRow');
            if (t) t.remove();
        }

        function addToHistory(text) {
            const item = document.createElement('div');
            item.className = 'history-item active';
            document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
            item.textContent = text.length > 36 ? text.slice(0, 36) + '…' : text;
            document.getElementById('sidebarHistory').prepend(item);
        }

        // New chat
        document.getElementById('newChatBtn').addEventListener('click', async () => {
            try {
                const res = await fetch(`/llm/api/chat/${sessionId}/clear/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
                    credentials: 'include'
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                sessionId = data.new_session_id;
            } catch (_) {
                sessionId = 'session-' + Math.random().toString(36).slice(2, 10);
            }

            const msgs = document.getElementById('messages');
            msgs.innerHTML = `
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-logo">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <h1>Dr. Charaka AI</h1>
        <p>Combining Ayurvedic wisdom with modern medicine.<br>Describe your concern to begin.</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" onclick="useSuggestion(this)">I have had a headache for 3 days</button>
          <button class="suggestion-card" onclick="useSuggestion(this)">What are symptoms of vitamin D deficiency?</button>
          <button class="suggestion-card" onclick="useSuggestion(this)">I feel anxious and cannot sleep well</button>
          <button class="suggestion-card" onclick="useSuggestion(this)">My lower back has been hurting for a week</button>
        </div>
      </div>`;
            textarea.value = '';
            textarea.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;
        });

        // Submit
        document.getElementById('chatForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const msg = textarea.value.trim();
            if (!msg) return;

            addUserMsg(msg);
            addToHistory(msg);
            textarea.value = '';
            textarea.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;
            showTyping();

            try {
                const res = await fetch('/llm/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
                    credentials: 'include',
                    body: JSON.stringify({ message: msg, session_id: sessionId })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (data.session_id) sessionId = data.session_id;
                removeTyping();
                addBotMsg(data.response);
            } catch (_) {
                removeTyping();
                addBotMsg('I apologize, but I encountered an error. Please try again.');
            }
        });
    </script>

</body>

</html>
